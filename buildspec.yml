version: 0.2

env:
  variables:
    CDK_DEFAULT_REGION: "ap-northeast-1"

phases:
  install:
    runtime-versions:
      python: 3.13
      nodejs: 20
    commands:
      - npm install -g aws-cdk
      - python -m venv .venv
      - source .venv/bin/activate
      - pip install -r requirements.txt

  pre_build:
    commands:
      - CFN_EXEC_STACK_NAME=stack-sgp-${ENV}-infra-cfn-execution-policies
      # cfn-execution-policies スタックをデプロイ（初回 or 更新）
      - |
        aws cloudformation deploy \
          --template-file init/cfn-execution-policies.yaml \
          --stack-name ${CFN_EXEC_STACK_NAME} \
          --capabilities CAPABILITY_NAMED_IAM \
          --parameter-overrides Env=${ENV} \
          --region ${CDK_DEFAULT_REGION}
      # CDK bootstrap（冪等のため毎回実行し、ポリシー ARN の変更を反映）
      - |
        ALL_POLICY_ARNS=$(aws cloudformation describe-stacks \
          --stack-name ${CFN_EXEC_STACK_NAME} \
          --region ${CDK_DEFAULT_REGION} \
          --query 'Stacks[0].Outputs[?OutputKey==`AllPolicyArns`].OutputValue' \
          --output text)
        cdk bootstrap \
          --toolkit-stack-name CDKToolkit-${ENV} \
          --qualifier ${ENV} \
          --cloudformation-execution-policies "${ALL_POLICY_ARNS}" \
          --region ${CDK_DEFAULT_REGION}
      # バックエンドのエクスポートが存在するか確認
      - |
        MAIN_API_EXPORT=$(aws cloudformation list-exports \
          --region ${CDK_DEFAULT_REGION} \
          --query "Exports[?Name=='sgp-${ENV}-backend-main-ApiGatewayId'].Value" \
          --output text)
        ANALYSIS_API_EXPORT=$(aws cloudformation list-exports \
          --region ${CDK_DEFAULT_REGION} \
          --query "Exports[?Name=='sgp-${ENV}-backend-analysis-ApiGatewayId'].Value" \
          --output text)
        if [ -n "$MAIN_API_EXPORT" ] && [ -n "$ANALYSIS_API_EXPORT" ]; then
          export BACKENDS_DEPLOYED=true
        else
          export BACKENDS_DEPLOYED=false
        fi
        echo "BACKENDS_DEPLOYED=${BACKENDS_DEPLOYED}"

  build:
    commands:
      - cdk synth --toolkit-stack-name CDKToolkit-${ENV} -c backends_deployed=${BACKENDS_DEPLOYED} -c allowed_ips="${ALLOWED_IPS}"
      - cdk deploy --toolkit-stack-name CDKToolkit-${ENV} --all --require-approval never -c backends_deployed=${BACKENDS_DEPLOYED} -c allowed_ips="${ALLOWED_IPS}"

  post_build:
    commands:
      - echo "CDK deployment completed."
